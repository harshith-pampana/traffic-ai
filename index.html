<!DOCTYPE html>
<html>
<head>
    <title>AI Autonomous Pilot</title>
    <style>
        body { margin: 0; background: #0b0c10; color: #66fcf1; font-family: sans-serif; display: flex; overflow: hidden; }
        #side { width: 300px; padding: 20px; background: #1f2833; border-right: 2px solid #45a29e; height: 100vh; box-sizing: border-box; }
        canvas { background: #121212; flex-grow: 1; }
        .stat { background: #0b0c10; padding: 10px; border-radius: 5px; margin-bottom: 10px; border-left: 3px solid #66fcf1; }
        .log { height: 200px; background: black; padding: 10px; font-size: 12px; color: #45a29e; overflow-y: auto; border-radius: 5px; }
        button { width: 100%; padding: 12px; background: #66fcf1; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div id="side">
    <h2>AI PERCEPTION</h2>
    <div class="stat">Status: <b id="status">OFFLINE</b></div>
    <div class="stat">Decision: <b id="decision">WAITING</b></div>
    <div class="stat">Speed: <b id="speed">0</b> km/h</div>
    
    <h3>SYSTEM LOG</h3>
    <div class="log" id="log">> Initializing sensors...<br>> Ready.</div>
    
    <button onclick="start()">ENGAGE AUTOPILOT</button>
    <button onclick="addObstacle()" style="background:#45a29e; color:white">SIMULATE OBSTACLE</button>
</div>

<canvas id="road"></canvas>

<script>
const canvas = document.getElementById("road");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth - 300;
canvas.height = window.innerHeight;

let car = { x: canvas.width/2, y: canvas.height - 150, w: 30, h: 55, speed: 0, targetX: canvas.width/2, indicator: null };
let obstacles = [];
let light = "GREEN";
let active = false;
let frame = 0;

function addObstacle() {
    let laneX = Math.random() > 0.5 ? canvas.width/2 - 50 : canvas.width/2 + 50;
    obstacles.push({ x: laneX, y: -100 });
    log("OBSTACLE DETECTED: Recalculating path...");
}

// Cycle Traffic Light
setInterval(() => {
    light = (light === "GREEN") ? "RED" : "GREEN";
    log("SIGNAL CHANGE: Light is now " + light);
}, 8000);

function log(msg) {
    let l = document.getElementById("log");
    l.innerHTML = `> ${msg}<br>` + l.innerHTML;
}

function update() {
    if(!active) return;
    frame++;
    ctx.clearRect(0,0,canvas.width, canvas.height);

    // Draw Road & Grass
    ctx.fillStyle = "#1b1b1b";
    ctx.fillRect(canvas.width/2 - 100, 0, 200, canvas.height);
    
    // Draw Traffic Light Visual
    ctx.fillStyle = (light === "RED") ? "#ff4d4d" : "#2ecc71";
    ctx.beginPath();
    ctx.arc(canvas.width/2 + 120, 50, 15, 0, Math.PI*2);
    ctx.fill();

    // AI PERCEPTION
    let distToLight = (light === "RED") ? car.y - 100 : 999;
    let dangerAhead = obstacles.some(ob => Math.abs(ob.x - car.x) < 40 && (car.y - ob.y) < 200 && (car.y - ob.y) > 0);

    // AI DECISION ENGINE
    if (distToLight < 150 || dangerAhead) {
        car.speed *= 0.85; // Intelligent Braking
        document.getElementById("decision").innerText = dangerAhead ? "AVOIDING COLLISION" : "STOPPING FOR SIGNAL";
        
        if (dangerAhead) {
            let newTarget = (car.x > canvas.width/2) ? canvas.width/2 - 50 : canvas.width/2 + 50;
            if (car.targetX !== newTarget) {
                car.targetX = newTarget;
                car.indicator = (car.targetX < car.x) ? "LEFT" : "RIGHT";
            }
        }
    } else {
        if (car.speed < 4.5) car.speed += 0.1;
        car.indicator = null;
        document.getElementById("decision").innerText = "STABLE CRUISE";
    }

    // Physics & Obstacle Loop
    car.x += (car.targetX - car.x) * 0.08;
    obstacles.forEach((ob, i) => {
        ctx.fillStyle = "#e67e22";
        ctx.fillRect(ob.x - 15, ob.y - 15, 30, 30);
        ob.y += 2;
        if(ob.y > canvas.height) obstacles.splice(i, 1);
    });

    // Draw Car
    ctx.fillStyle = "#66fcf1";
    ctx.fillRect(car.x - 15, car.y - 27, 30, 55);

    // Draw Indicators (Visual HMI)
    if (car.indicator && Math.floor(frame / 10) % 2 === 0) {
        ctx.fillStyle = "yellow";
        if (car.indicator === "LEFT") ctx.fillRect(car.x - 20, car.y - 25, 5, 10);
        if (car.indicator === "RIGHT") ctx.fillRect(car.x + 15, car.y - 25, 5, 10);
    }

    document.getElementById("speed").innerText = Math.round(car.speed * 25);
    requestAnimationFrame(update);
}

function start() {
    active = true;
    log("AI MISSION STARTED.");
    update();
}
</script>
</body>
</html>
