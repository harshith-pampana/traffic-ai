<!DOCTYPE html>
<html>
<head>
    <title>AI Autonomous Pilot</title>
    <style>
        body { margin: 0; background: #0b0c10; color: #66fcf1; font-family: sans-serif; display: flex; overflow: hidden; }
        #side { width: 300px; padding: 20px; background: #1f2833; border-right: 2px solid #45a29e; height: 100vh; box-sizing: border-box; }
        canvas { background: #121212; flex-grow: 1; }
        .stat { background: #0b0c10; padding: 10px; border-radius: 5px; margin-bottom: 10px; border-left: 3px solid #66fcf1; }
        .log { height: 200px; background: black; padding: 10px; font-size: 12px; color: #45a29e; overflow-y: auto; border-radius: 5px; }
        button { width: 100%; padding: 12px; background: #66fcf1; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div id="side">
    <h2>AI PERCEPTION</h2>
    <div class="stat">Status: <b id="status">OFFLINE</b></div>
    <div class="stat">Decision: <b id="decision">WAITING</b></div>
    <div class="stat">Speed: <b id="speed">0</b> km/h</div>
    
    <h3>SYSTEM LOG</h3>
    <div class="log" id="log">> Initializing sensors...<br>> Ready.</div>
    
    <button onclick="start()">ENGAGE AUTOPILOT</button>
    <button onclick="addObstacle()" style="background:#45a29e; color:white">SIMULATE OBSTACLE</button>
</div>

<canvas id="road"></canvas>

<script>
const canvas = document.getElementById("road");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth - 300;
canvas.height = window.innerHeight;

let car = { x: canvas.width/2, y: canvas.height - 150, w: 30, h: 55, speed: 0, targetX: canvas.width/2 };
let obstacles = [];
let active = false;

function addObstacle() {
    let laneX = Math.random() > 0.5 ? canvas.width/2 - 50 : canvas.width/2 + 50;
    obstacles.push({ x: laneX, y: -50 });
    log("Obstacle detected by long-range radar!");
}

function log(msg) {
    let l = document.getElementById("log");
    l.innerHTML = `> ${msg}<br>` + l.innerHTML;
}

function update() {
    if(!active) return;
    ctx.clearRect(0,0,canvas.width, canvas.height);

    // Draw Road
    ctx.fillStyle = "#222";
    ctx.fillRect(canvas.width/2 - 100, 0, 200, canvas.height);
    ctx.strokeStyle = "#444";
    ctx.setLineDash([20, 20]);
    ctx.strokeRect(canvas.width/2 - 1, 0, 2, canvas.height);

    // AI SENSING
    let danger = false;
    obstacles.forEach((ob, index) => {
        ctx.fillStyle = "orange";
        ctx.fillRect(ob.x - 15, ob.y - 15, 30, 30);
        ob.y += 3; // Obstacles move down

        // Collision detection (Sensor range)
        let dist = car.y - ob.y;
        if(Math.abs(ob.x - car.x) < 40 && dist < 180 && dist > 0) {
            danger = true;
        }
        if(ob.y > canvas.height) obstacles.splice(index, 1);
    });

    // AI DECISION ENGINE
    if(danger) {
        car.speed *= 0.9; // Slow down
        document.getElementById("decision").innerText = "EVADING";
        car.targetX = (car.x > canvas.width/2) ? canvas.width/2 - 50 : canvas.width/2 + 50;
    } else {
        if(car.speed < 5) car.speed += 0.1;
        document.getElementById("decision").innerText = "CRUISING";
        document.getElementById("status").innerText = "AUTONOMOUS";
    }

    // Physics
    car.x += (car.targetX - car.x) * 0.1; // Smooth steering
    document.getElementById("speed").innerText = Math.round(car.speed * 20);

    // Draw Car & Sensors
    ctx.fillStyle = "#66fcf1";
    ctx.fillRect(car.x - 15, car.y - 27, 30, 55);
    
    // Visualize "Radar Rays"
    ctx.strokeStyle = danger ? "red" : "#66fcf133";
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(car.x, car.y);
    ctx.lineTo(car.x, car.y - 180);
    ctx.stroke();

    requestAnimationFrame(update);
}

function start() {
    active = true;
    log("Autopilot engaged. Sensors active.");
    update();
}
</script>
</body>
</html>
