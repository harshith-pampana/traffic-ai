<!DOCTYPE html>
<html>
<head>
    <title>AUTODRIVE AI // SIMULATION V2.0</title>
    <style>
        :root { --neon: #66fcf1; --dark: #0b0c10; --accent: #45a29e; --warn: #e94560; }
        body { margin: 0; background: var(--dark); color: var(--neon); font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* Left HUD */
        #left-hud { width: 320px; background: #1f2833; border-right: 2px solid var(--accent); padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .hud-module { background: var(--dark); border: 1px solid var(--accent); padding: 12px; border-radius: 4px; }
        .label { font-size: 10px; text-transform: uppercase; color: var(--accent); margin-bottom: 5px; letter-spacing: 1px; }
        .val { font-size: 18px; font-weight: bold; color: #fff; }
        
        /* Center Canvas */
        #sim-container { flex-grow: 1; position: relative; background: #121212; display: flex; justify-content: center; }
        canvas { background: #1a1a1a; box-shadow: 0 0 50px rgba(0,0,0,0.5); }

        /* Right Control Panel */
        #right-hud { width: 320px; background: #1f2833; border-left: 2px solid var(--accent); padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .control-btn { background: transparent; border: 1px solid var(--accent); color: var(--neon); padding: 10px; cursor: pointer; text-transform: uppercase; font-size: 11px; transition: 0.3s; }
        .control-btn:hover { background: var(--neon); color: var(--dark); }
        .log { flex-grow: 1; background: #000; font-family: monospace; font-size: 11px; padding: 10px; color: #0f0; overflow-y: auto; border: 1px solid #333; }
    </style>
</head>
<body>

<div id="left-hud">
    <h2 style="margin:0; font-style: italic;">AUTODRIVE <span style="color:#fff">AI</span></h2>
    <div class="hud-module">
        <div class="label">Current Decision</div>
        <div class="val" id="decision">INITIALIZING...</div>
    </div>
    <div class="hud-module">
        <div class="label">Trip Stats</div>
        <div style="font-size: 12px;">Distance: <span id="dist">0</span> m</div>
        <div style="font-size: 12px;">Decisions: <span id="dec-count">0</span></div>
        <div style="font-size: 12px;">Incidents: <span id="incidents" style="color:var(--warn)">0</span></div>
    </div>
    <div class="hud-module">
        <div class="label">Sensor Readings</div>
        <div id="sensor-grid" style="display:grid; grid-template-columns: 1fr 1fr; gap:5px; font-size:10px;">
            <div id="s-front">FRONT: CLEAR</div>
            <div id="s-rear">REAR: CLEAR</div>
            <div id="s-left">LEFT: CLEAR</div>
            <div id="s-right">RIGHT: CLEAR</div>
        </div>
    </div>
</div>

<div id="sim-container">
    <canvas id="road"></canvas>
</div>

<div id="right-hud">
    <div class="label">Scenario Controls</div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
        <button class="control-btn" onclick="spawnEntity('obs')">+ Obstacle</button>
        <button class="control-btn" onclick="spawnEntity('ped')">+ Person</button>
        <button class="control-btn" onclick="toggleLight()">Toggle Light</button>
        <button class="control-btn" onclick="location.reload()">Reset Sim</button>
    </div>
    <div class="label">Decision Log</div>
    <div class="log" id="log"></div>
    <button id="start-btn" style="background:var(--neon); color:#000; font-weight:bold; padding:15px; border:none; cursor:pointer;" onclick="engage()">ENGAGE AUTO-PILOT</button>
</div>

<script>
const canvas = document.getElementById("road");
const ctx = canvas.getContext("2d");
canvas.width = 500;
canvas.height = window.innerHeight;

let worldY = 0;
let active = false;
let ego = { x: 250, y: canvas.height - 150, speed: 0, targetX: 250, totalDist: 0, decisions: 0 };
let entities = [];
let lightState = "GREEN";
let lanes = [150, 250, 350];

function log(msg) {
    const l = document.getElementById("log");
    l.innerHTML = `<span style="color:#45a29e">[${new Date().toLocaleTimeString([], {hour12:false})}]</span> ${msg}<br>` + l.innerHTML;
}

function spawnEntity(type) {
    let lane = lanes[Math.floor(Math.random() * lanes.length)];
    entities.push({ type, x: lane, y: -50, speed: type === 'ped' ? 1.5 : 0 });
    log(`DEPLOYED: ${type.toUpperCase()} at Lane ${lanes.indexOf(lane) + 1}`);
}

function toggleLight() {
    lightState = lightState === "GREEN" ? "RED" : "GREEN";
    log(`SIGNAL: Switched to ${lightState}`);
}

function drawCar(x, y, color, isEgo=false) {
    ctx.fillStyle = color;
    ctx.fillRect(x - 18, y - 35, 36, 70);
    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.fillRect(x - 14, y - 25, 28, 15); // Windshield
    if(isEgo) {
        // Draw LIDAR Rays
        ctx.strokeStyle = "rgba(102, 252, 241, 0.3)";
        for(let i = -0.5; i <= 0.5; i += 0.2) {
            ctx.beginPath();
            ctx.moveTo(x, y - 30);
            ctx.lineTo(x + (i * 100), y - 200);
            ctx.stroke();
        }
    }
}

function update() {
    if(!active) return;
    ctx.clearRect(0,0,canvas.width, canvas.height);
    worldY += ego.speed;
    ego.totalDist += ego.speed * 0.1;

    // Road Drawing
    ctx.fillStyle = "#222"; ctx.fillRect(100, 0, 300, canvas.height);
    ctx.strokeStyle = "#444"; ctx.setLineDash([20, 20]);
    [100, 200, 300, 400].forEach(lx => {
        ctx.beginPath(); ctx.moveTo(lx, 0); ctx.lineTo(lx, canvas.height); ctx.stroke();
    });

    let hazardAhead = false;
    entities.forEach((en, i) => {
        let localY = en.y + (en.speed === 0 ? worldY : 0); // Static vs moving
        if(en.type === 'obs') ctx.fillStyle = "#ff9800";
        else ctx.fillStyle = "#e91e63";
        
        ctx.fillRect(en.x - 15, (en.y % canvas.height), 30, 30);
        en.y += 2; // Falling speed

        if(Math.abs(en.x - ego.x) < 40 && en.y > 200 && en.y < ego.y) hazardAhead = true;
    });

    // AI DECISION LOGIC
    if(hazardAhead || lightState === "RED") {
        ego.speed *= 0.95;
        document.getElementById("decision").innerText = hazardAhead ? "EVASIVE BRAKING" : "SIGNAL STOP";
        if(hazardAhead) {
             ego.targetX = ego.x < 250 ? 350 : 150; // Simple lane change
             ego.decisions++;
        }
    } else {
        if(ego.speed < 5) ego.speed += 0.1;
        ego.targetX = 250;
        document.getElementById("decision").innerText = "CRUISING_L1";
    }

    ego.x += (ego.targetX - ego.x) * 0.05;

    // UI Updates
    document.getElementById("dist").innerText = Math.round(ego.totalDist);
    document.getElementById("dec-count").innerText = ego.decisions;

    drawCar(ego.x, ego.y, "#66fcf1", true);
    requestAnimationFrame(update);
}

function engage() {
    active = true;
    document.getElementById("start-btn").style.display = "none";
    log("SYSTEM: AI Autopilot Engaged");
    update();
}
</script>
</body>
</html>
