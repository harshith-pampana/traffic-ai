<!DOCTYPE html>
<html>
<head>
    <title>AI Autonomous Driving Case Study</title>
    <style>
        body { margin: 0; background: #1a1a2e; color: #00fff2; font-family: 'Segoe UI', sans-serif; display: flex; overflow: hidden; }
        #sidebar { width: 350px; padding: 25px; background: #16213e; border-right: 2px solid #0f3460; height: 100vh; box-sizing: border-box; display: flex; flex-direction: column; gap: 15px; }
        canvas { background: #1b1b1b; flex-grow: 1; cursor: crosshair; }
        .card { background: #0f3460; padding: 15px; border-radius: 10px; border-left: 5px solid #00fff2; }
        .log { flex-grow: 1; background: #000; padding: 10px; font-family: monospace; font-size: 11px; color: #00ff00; overflow-y: auto; border: 1px solid #00fff2; }
        button { width: 100%; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-main { background: #00fff2; color: #16213e; }
        .btn-alt { background: #e94560; color: white; margin-top: 5px; }
        h2 { margin: 0; font-size: 1.4em; letter-spacing: 1px; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>AI PILOT PRO</h2>
    <div class="card">
        Decision: <b id="decision">IDLE</b><br>
        Speed: <b id="speed">0</b> km/h<br>
        Sensors: <b id="sensorStat">ACTIVE</b>
    </div>
    
    <div class="log" id="log">> System Standby...</div>
    
    <button class="btn-main" onclick="start()">ENGAGE AUTOPILOT</button>
    <button class="btn-alt" onclick="addPedestrian()">TRIGGER PEDESTRIAN</button>
    <button class="btn-alt" style="background:#f9a825" onclick="addObstacle()">DROP HAZARD</button>
</div>

<canvas id="road"></canvas>

<script>
const canvas = document.getElementById("road");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth - 350;
    canvas.height = window.innerHeight;
}
window.onresize = resize;
resize();

// Simulation State
let car = { x: 0, y: 0, targetX: 0, speed: 0, w: 35, h: 60, indicator: null };
let obstacles = [];
let pedestrians = [];
let light = "GREEN";
let active = false;
let frame = 0;

car.x = canvas.width/2;
car.targetX = canvas.width/2;
car.y = canvas.height - 150;

function log(msg) {
    const l = document.getElementById("log");
    l.innerHTML = `> ${msg}<br>` + l.innerHTML;
}

function addObstacle() {
    obstacles.push({ x: canvas.width/2 + (Math.random() > 0.5 ? 50 : -50), y: -50 });
    log("SENSOR: Static hazard detected.");
}

function addPedestrian() {
    pedestrians.push({ x: -20, y: 200, speed: 1.5 });
    log("WARNING: Pedestrian on crossing!");
}

// Light Cycle
setInterval(() => {
    light = (light === "GREEN") ? "RED" : "GREEN";
    log("ENVIRONMENT: Signal turned " + light);
}, 7000);

function update() {
    if(!active) return;
    frame++;
    ctx.clearRect(0,0,canvas.width, canvas.height);

    const roadX = canvas.width/2 - 110;
    const roadW = 220;

    // 1. DRAW SCENERY
    ctx.fillStyle = "#2c3e50"; // Sidewalks
    ctx.fillRect(roadX - 50, 0, 50, canvas.height);
    ctx.fillRect(roadX + roadW, 0, 50, canvas.height);
    
    ctx.fillStyle = "#34495e"; // Road
    ctx.fillRect(roadX, 0, roadW, canvas.height);

    // Crosswalk
    ctx.fillStyle = "rgba(255,255,255,0.3)";
    for(let i=0; i<6; i++) ctx.fillRect(roadX + 5 + (i*35), 180, 25, 60);

    // 2. AI PERCEPTION (LIDAR)
    let sensorRange = 220;
    let stopRequired = false;
    let hazardInPath = false;

    // Check Pedestrians
    pedestrians.forEach((p, i) => {
        ctx.fillStyle = "#ff00ff";
        ctx.beginPath(); ctx.arc(p.x, p.y, 10, 0, Math.PI*2); ctx.fill();
        p.x += p.speed;
        if(p.x > roadX && p.x < roadX + roadW && Math.abs(car.y - p.y) < sensorRange) stopRequired = true;
        if(p.x > canvas.width) pedestrians.splice(i, 1);
    });

    // Check Obstacles
    obstacles.forEach((ob, i) => {
        ctx.fillStyle = "#f9a825";
        ctx.fillRect(ob.x - 15, ob.y - 15, 30, 30);
        ob.y += 2;
        if(Math.abs(ob.x - car.x) < 40 && (car.y - ob.y) < sensorRange && (car.y - ob.y) > 0) hazardInPath = true;
        if(ob.y > canvas.height) obstacles.splice(i, 1);
    });

    // Traffic Light
    if(light === "RED" && car.y > 250 && car.y < 500) stopRequired = true;

    // 3. DECISION ENGINE
    if(stopRequired || (hazardInPath && car.speed > 1)) {
        car.speed *= 0.88;
        document.getElementById("decision").innerText = stopRequired ? "BRAKING (OBJECT)" : "EVADING HAZARD";
        if(hazardInPath) {
            car.targetX = (car.x > canvas.width/2) ? canvas.width/2 - 55 : canvas.width/2 + 55;
            car.indicator = (car.targetX < car.x) ? "LEFT" : "RIGHT";
        }
    } else {
        if(car.speed < 5) car.speed += 0.1;
        car.indicator = null;
        document.getElementById("decision").innerText = "CRUISING";
    }

    // 4. PHYSICS & DRAWING
    car.x += (car.targetX - car.x) * 0.08;
    
    // Draw Car
    ctx.fillStyle = "#00fff2";
    ctx.shadowBlur = 15; ctx.shadowColor = "#00fff2";
    ctx.fillRect(car.x - 15, car.y - 30, 30, 60);
    ctx.shadowBlur = 0;

    // Sensor Visualization (The Sweep)
    ctx.strokeStyle = (stopRequired || hazardInPath) ? "red" : "rgba(0, 255, 242, 0.2)";
    ctx.setLineDash([5, 5]);
    ctx.strokeRect(car.x - 20, car.y - sensorRange, 40, sensorRange);

    // Traffic Light Visual
    ctx.fillStyle = "#333"; ctx.fillRect(roadX + roadW + 10, 50, 40, 100);
    ctx.fillStyle = (light === "RED") ? "red" : "#222";
    ctx.beginPath(); ctx.arc(roadX + roadW + 30, 75, 12, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = (light === "GREEN") ? "#00ff00" : "#222";
    ctx.beginPath(); ctx.arc(roadX + roadW + 30, 125, 12, 0, Math.PI*2); ctx.fill();

    document.getElementById("speed").innerText = Math.round(car.speed * 20);
    requestAnimationFrame(update);
}

function start() {
    active = true;
    log("NEURAL NETWORK ONLINE.");
    update();
}
</script>
</body>
</html>
