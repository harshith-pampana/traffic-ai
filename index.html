<!DOCTYPE html>
<html>
<head>
    <title>AI Urban Command Center</title>
    <style>
        body { margin: 0; background: #0b0c10; color: #66fcf1; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; overflow: hidden; }
        #sidebar { width: 380px; padding: 20px; background: #1f2833; border-right: 3px solid #45a29e; height: 100vh; box-sizing: border-box; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        canvas { background: #121212; flex-grow: 1; }
        
        .hud-panel { background: #0b0c10; padding: 15px; border-radius: 10px; border: 1px solid #45a29e; box-shadow: 0 0 15px rgba(102, 252, 241, 0.1); }
        .hud-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; border-bottom: 1px solid #1f2833; padding-bottom: 4px; }
        .hud-val { color: #fff; font-weight: bold; }
        
        .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 12px; border: 1px solid #45a29e; border-radius: 5px; background: transparent; color: #66fcf1; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 11px; text-transform: uppercase; }
        button:hover { background: #66fcf1; color: #0b0c10; box-shadow: 0 0 10px #66fcf1; }
        .btn-active { background: #45a29e; color: white; }

        .log { flex-grow: 1; background: #000; padding: 10px; font-family: 'Courier New', monospace; font-size: 11px; color: #00ff00; border-radius: 5px; overflow-y: auto; border: 1px solid #1f2833; }
        h2 { margin: 0; font-size: 1.2em; text-align: center; letter-spacing: 3px; color: #66fcf1; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>DASHBOARD HUD</h2>
    
    <div class="hud-panel">
        <div class="hud-item">Decision: <span class="hud-val" id="decision">STANDBY</span></div>
        <div class="hud-item">Speed: <span class="hud-val" id="speed">0</span> km/h</div>
        <div class="hud-item">Lane Pos: <span class="hud-val" id="lane">CENTER</span></div>
        <div class="hud-item">Sensors: <span class="hud-val" id="sensorStat">SCANNING</span></div>
    </div>

    <h2>SCENARIO CONTROLS</h2>
    <div class="control-grid">
        <button onclick="start()">Engage AI</button>
        <button onclick="addObstacle()">Add Obstacle</button>
        <button onclick="addPedestrian()">Add Pedestrian</button>
        <button onclick="forceRedLight()">Force Red Light</button>
    </div>

    <div class="log" id="log">> Neural Link Established...</div>
</div>

<canvas id="cityCanvas"></canvas>

<script>
const canvas = document.getElementById("cityCanvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth - 380;
canvas.height = window.innerHeight;

let worldScroll = 0;
let active = false;
let frame = 0;

// Configurations
const roadW = 160;
const junctionGap = 700;
let ego = { x: canvas.width/2, y: canvas.height - 200, w: 30, h: 60, speed: 0, targetX: canvas.width/2 };
let junctions = [
    { worldY: 100, state: "GREEN", timer: 0 },
    { worldY: 100 - junctionGap, state: "RED", timer: 150 }
];
let entities = []; // Combined array for cross-cars and pedestrians

function log(m) { 
    const l = document.getElementById("log");
    l.innerHTML = `> ${m}<br>` + l.innerHTML; 
}

function forceRedLight() {
    junctions.forEach(j => { j.state = "RED"; j.timer = 0; });
    log("MANUAL OVERRIDE: All lights RED");
}

function addObstacle() {
    entities.push({ type: 'obs', x: canvas.width/2 + (Math.random() > 0.5 ? 40 : -40), y: -100, speed: 2 });
    log("SCENARIO: Deployed road hazard.");
}

function addPedestrian() {
    entities.push({ type: 'ped', x: -20, y: 150, speed: 1.5 });
    log("SCENARIO: Pedestrian entering crosswalk.");
}

function drawVehicle(x, y, w, h, color, isEgo=false) {
    ctx.save();
    ctx.translate(x, y);
    ctx.fillStyle = color;
    ctx.fillRect(-w/2, -h/2, w, h);
    ctx.fillStyle = "rgba(0,0,0,0.6)"; // Windows
    ctx.fillRect(-w/2 + 4, -h/2 + 8, w - 8, 12);
    if(isEgo) {
        ctx.strokeStyle = "#66fcf1"; ctx.lineWidth = 2;
        ctx.strokeRect(-w/2 - 2, -h/2 - 2, w + 4, h + 4);
    }
    ctx.restore();
}

function update() {
    if(!active) return;
    ctx.clearRect(0,0,canvas.width, canvas.height);
    worldScroll += ego.speed;
    frame++;

    let roadX = canvas.width/2 - roadW/2;

    // DRAW CITY
    ctx.fillStyle = "#1f2833"; ctx.fillRect(0,0,canvas.width, canvas.height); // Ground
    ctx.fillStyle = "#0b0c10"; ctx.fillRect(roadX, 0, roadW, canvas.height); // Road
    
    // Lane Marking
    ctx.strokeStyle = "#45a29e"; ctx.setLineDash([30, 30]);
    ctx.beginPath(); ctx.moveTo(canvas.width/2, 0); ctx.lineTo(canvas.width/2, canvas.height); ctx.stroke();

    let collisionAlert = false;
    let lightStop = false;

    // JUNCTION LOOP
    junctions.forEach((j, idx) => {
        let loopSize = junctionGap * 2;
        let localY = (( (j.worldY + worldScroll) % loopSize) + loopSize) % loopSize;
        
        // Draw Crossing Road
        ctx.setLineDash([]);
        ctx.fillStyle = "#0b0c10";
        ctx.fillRect(0, localY - 60, canvas.width, 120);

        // Light Logic
        j.timer++;
        if(j.timer > 400) { j.state = (j.state === "GREEN" ? "RED" : "GREEN"); j.timer = 0; }
        
        // Visual Lights
        ctx.fillStyle = "#1f2833"; ctx.fillRect(roadX + roadW + 10, localY - 45, 30, 90);
        ctx.fillStyle = j.state === "RED" ? "#ff0000" : "#222";
        ctx.beginPath(); ctx.arc(roadX + roadW + 25, localY - 25, 10, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = j.state === "GREEN" ? "#00ff00" : "#222";
        ctx.beginPath(); ctx.arc(roadX + roadW + 25, localY + 20, 10, 0, Math.PI*2); ctx.fill();

        // AI Perception: Junction Traffic
        if(j.state === "RED" && localY > ego.y - 180 && localY < ego.y) lightStop = true;

        // Auto-spawn cross traffic ONLY in lanes
        if(j.state === "RED" && frame % 150 === 0) {
            let dir = Math.random() > 0.5 ? 1 : -1;
            entities.push({ type: 'car', x: dir > 0 ? -50 : canvas.width + 50, y: localY + (dir * 30), speed: dir * 3.5 });
        }
    });

    // ENTITY PROCESSING
    entities.forEach((en, index) => {
        if(en.type === 'car') {
            drawVehicle(en.x, en.y, 60, 32, "#e94560");
            en.x += en.speed;
        } else if(en.type === 'obs') {
            ctx.fillStyle = "#f9a825"; ctx.fillRect(en.x - 15, en.y - 15, 30, 30);
            en.y += ego.speed + 1; // Obstacles stay on road
            if(Math.abs(en.x - ego.x) < 40 && (ego.y - en.y) < 200 && (ego.y - en.y) > 0) collisionAlert = true;
        } else if(en.type === 'ped') {
            ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(en.x, en.y, 8, 0, Math.PI*2); ctx.fill(); // Stickman head
            ctx.fillRect(en.x-2, en.y, 4, 15); // body
            en.x += en.speed;
            if(en.x > roadX && en.x < roadX + roadW && Math.abs(ego.y - en.y) < 200) collisionAlert = true;
        }
        if(en.x < -100 || en.x > canvas.width + 100 || en.y > canvas.height + 100) entities.splice(index, 1);
    });

    // AI DECISION ENGINE
    if(lightStop || collisionAlert) {
        ego.speed *= 0.92;
        document.getElementById("decision").innerText = lightStop ? "SIGNAL STOP" : "EVADING HAZARD";
        if(collisionAlert && !lightStop) {
            ego.targetX = (ego.x > canvas.width/2) ? canvas.width/2 - 45 : canvas.width/2 + 45;
        }
    } else {
        if(ego.speed < 4.5) ego.speed += 0.08;
        ego.targetX = canvas.width/2;
        document.getElementById("decision").innerText = "CRUISING";
    }

    // SMOOTHING
    ego.x += (ego.targetX - ego.x) * 0.1;
    let laneLabel = ego.x < canvas.width/2 - 20 ? "LEFT" : (ego.x > canvas.width/2 + 20 ? "RIGHT" : "CENTER");
    
    // HUD UPDATE
    document.getElementById("speed").innerText = Math.round(ego.speed * 22);
    document.getElementById("lane").innerText = laneLabel;

    // DRAW EGO
    drawVehicle(ego.x, ego.y, ego.w, ego.h, "#66fcf1", true);
    
    // Sensor Rays
    ctx.strokeStyle = (lightStop || collisionAlert) ? "red" : "rgba(102, 252, 241, 0.2)";
    ctx.setLineDash([5, 5]);
    ctx.strokeRect(ego.x - 20, ego.y - 200, 40, 200);

    requestAnimationFrame(update);
}

function start() { active = true; log("URBAN AI INITIALIZED."); update(); }
</script>
</body>
</html>
