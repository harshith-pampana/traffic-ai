<!DOCTYPE html>
<html>
<head>
    <title>AI Autonomous Urban Simulation</title>
    <style>
        body { margin: 0; background: #1a1a2e; color: #00fff2; font-family: 'Courier New', monospace; display: flex; overflow: hidden; }
        #sidebar { width: 340px; padding: 20px; background: #16213e; border-right: 3px solid #00fff2; height: 100vh; box-sizing: border-box; display: flex; flex-direction: column; gap: 10px; z-index: 100; }
        canvas { background: #222; flex-grow: 1; }
        .card { background: #0f3460; padding: 12px; border-radius: 8px; border-left: 5px solid #00fff2; font-size: 13px; }
        .log { flex-grow: 1; background: #000; padding: 10px; font-size: 11px; color: #00ff00; overflow-y: auto; border: 1px solid #00fff2; border-radius: 5px; }
        button { width: 100%; padding: 15px; background: #00fff2; color: #16213e; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; }
        b { color: #fff; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>CITY_AI v4.0</h2>
    <div class="card">
        EGO_DECISION: <b id="decision">STANDBY</b><br>
        CURRENT_SPEED: <b id="speed">0</b> km/h<br>
        SIGNAL_A: <b id="j1Stat">--</b> | SIGNAL_B: <b id="j2Stat">--</b>
    </div>
    <div class="log" id="log">> Environment Loaded.<br>> Awaiting Ignition...</div>
    <button onclick="start()">INITIATE DRIVE</button>
</div>

<canvas id="cityCanvas"></canvas>

<script>
const canvas = document.getElementById("cityCanvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth - 340;
canvas.height = window.innerHeight;

// Config
const roadWidth = 140;
const junctionSpacing = 700;
let worldScroll = 0;
let active = false;

// Entities
let ego = { x: canvas.width/2, y: canvas.height - 200, w: 30, h: 55, speed: 0 };
let junctions = [
    { worldY: 200, state: "GREEN", timer: 0 },
    { worldY: 200 - junctionSpacing, state: "RED", timer: 150 }
];
let crossCars = [];
let peds = [];

function log(m) { 
    const l = document.getElementById("log");
    l.innerHTML = `> ${m}<br>` + l.innerHTML; 
}

function drawCar(x, y, w, h, color, angle=0) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.fillStyle = color;
    ctx.fillRect(-w/2, -h/2, w, h);
    ctx.fillStyle = "rgba(0,0,0,0.5)"; // Windshield
    ctx.fillRect(-w/2 + 5, -h/2 + 5, w - 10, 10);
    ctx.restore();
}

function drawStickman(x, y, isWaiting) {
    ctx.fillStyle = isWaiting ? "#ff4d4d" : "#fff";
    ctx.fillRect(x-2, y-15, 4, 10); // body
    ctx.beginPath(); ctx.arc(x, y-18, 3, 0, Math.PI*2); ctx.fill(); // head
}

function update() {
    if(!active) return;
    ctx.clearRect(0,0,canvas.width, canvas.height);
    worldScroll += ego.speed;

    let roadX = canvas.width/2 - roadWidth/2;

    // 1. DRAW BACKGROUND & VERTICAL ROAD
    ctx.fillStyle = "#2c3e50"; ctx.fillRect(0,0,canvas.width, canvas.height);
    ctx.fillStyle = "#34495e"; ctx.fillRect(roadX, 0, roadWidth, canvas.height);
    
    // Lane lines
    ctx.strokeStyle = "#fff"; ctx.setLineDash([20, 20]); ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(canvas.width/2, 0); ctx.lineTo(canvas.width/2, canvas.height); ctx.stroke();

    let stopNeeded = false;

    // 2. JUNCTION LOGIC
    junctions.forEach((j, i) => {
        // Infinite Wrap
        let loop = junctionSpacing * 2;
        let localY = (( (j.worldY + worldScroll) % loop) + loop) % loop;
        
        // Horizontal Road
        ctx.setLineDash([]);
        ctx.fillStyle = "#34495e";
        ctx.fillRect(0, localY - 60, canvas.width, 120);
        
        // Traffic Signal Cycle
        j.timer++;
        if(j.timer > 300) { j.state = j.state === "GREEN" ? "RED" : "GREEN"; j.timer = 0; }
        document.getElementById(`j${i+1}Stat`).innerText = j.state;

        // Draw Lights
        ctx.fillStyle = "#111"; ctx.fillRect(roadX + roadWidth + 5, localY - 40, 25, 80);
        ctx.fillStyle = j.state === "RED" ? "red" : "#222";
        ctx.beginPath(); ctx.arc(roadX + roadWidth + 17, localY - 25, 8, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = j.state === "GREEN" ? "#00ff00" : "#222";
        ctx.beginPath(); ctx.arc(roadX + roadWidth + 17, localY + 15, 8, 0, Math.PI*2); ctx.fill();

        // Cross Traffic Spawner
        if(j.state === "RED" && Math.random() < 0.02) { // Horizontal cars move when vertical is RED
            let dir = Math.random() > 0.5 ? 1 : -1;
            crossCars.push({ x: dir > 0 ? -50 : canvas.width + 50, y: localY + (dir * 30), speed: dir * 4, color: "#e74c3c" });
        }

        // Stickmen Spawner
        if(Math.random() < 0.01) {
            peds.push({ x: roadX - 30, y: localY + 40, state: "WAITING", junction: j });
        }

        // AI PERCEPTION: Stop if light is red and junction is ahead
        if(j.state === "RED" && localY > ego.y - 150 && localY < ego.y) stopNeeded = true;
    });

    // 3. ENTITY UPDATES
    // Cross Cars
    crossCars.forEach((c, i) => {
        drawCar(c.x, c.y, 50, 25, c.color, 0);
        c.x += c.speed;
        if(c.x < -100 || c.x > canvas.width + 100) crossCars.splice(i, 1);
    });

    // Pedestrians
    peds.forEach((p, i) => {
        let loop = junctionSpacing * 2;
        let localY = (( (p.junction.worldY + worldScroll) % loop) + loop) % loop;
        drawStickman(p.x, localY + 40, p.state === "WAITING");
        
        if(p.junction.state === "RED") { // Peds cross when traffic stops
            p.state = "CROSSING";
            p.x += 1.5;
        }
        if(p.x > canvas.width) peds.splice(i,1);
    });

    // 4. EGO AI DECISION
    if(stopNeeded) {
        ego.speed *= 0.92;
        document.getElementById("decision").innerText = "BRAKING (SIGNAL)";
    } else {
        if(ego.speed < 4) ego.speed += 0.08;
        document.getElementById("decision").innerText = "CRUISING";
    }

    // 5. DRAW EGO CAR
    drawCar(ego.x, ego.y, ego.w, ego.h, "#00fff2", 0);
    // Visual Radar
    ctx.strokeStyle = stopNeeded ? "red" : "rgba(0,255,242,0.2)";
    ctx.setLineDash([5,5]);
    ctx.strokeRect(ego.x - 15, ego.y - 150, 30, 150);

    document.getElementById("speed").innerText = Math.round(ego.speed * 20);
    requestAnimationFrame(update);
}

function start() { active = true; log("URBAN AI INITIALIZED."); update(); }
</script>
</body>
</html>
